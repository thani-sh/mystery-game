<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixi Test</title>
  <script src="https://pixijs.download/v8.1.6/pixi.js"></script>
</head>
<body>
  <script>
    (async () => {
      const app = new PIXI.Application();
      await app.init({ background: '#1099bb', width: 800, height: 600 });
      document.body.appendChild(app.canvas);

      try {
        const asset = await PIXI.Assets.load("/assets/actors/bets/idle.json");
        console.log("Loaded", asset);
        const sprite = new PIXI.AnimatedSprite(asset.data.animations.down);
        sprite.position.set(400, 300);
        sprite.anchor.set(0.5);
        app.stage.addChild(sprite);
      } catch(e) {
        console.error(e);
      }
    })();
  </script>
</body>
</html>
